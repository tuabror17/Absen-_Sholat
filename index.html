
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Sholat Berjamaah - Landscape Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Amiri:wght@700&display=swap');
        
        :root {
            --tosca-glow: #2dd4bf;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f1a;
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: linear-gradient(to right, rgba(11, 15, 26, 0.92), rgba(11, 15, 26, 0.7)), 
                              url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--tosca-glow);
        }

        .glow-text {
            color: #ffffff;
            text-shadow: 0 0 10px var(--tosca-glow), 0 0 20px rgba(45, 212, 191, 0.3);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        @keyframes scan-line {
            0%, 100% { top: 15%; opacity: 0.8; }
            50% { top: 85%; opacity: 0.2; }
        }

        .scan-anim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--tosca-glow);
            box-shadow: 0 0 25px var(--tosca-glow);
            animation: scan-line 3.5s infinite ease-in-out;
            z-index: 20;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(45, 212, 191, 0.2); border-radius: 10px; }

        .split-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        .left-panel {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .right-panel {
            width: 50%;
            height: 100%;
            position: relative;
            background: #000;
        }

        .prayer-box.active-neon {
            background: rgba(45, 212, 191, 0.15);
            border-color: var(--tosca-glow);
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.2), inset 0 0 10px rgba(45, 212, 191, 0.1);
        }
        
        .logo-placeholder {
            width: 60px;
            height: 60px;
            border: 2px dashed rgba(45, 212, 191, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto 0;
            background: rgba(45, 212, 191, 0.05);
            overflow: hidden;
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .history-item {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in {
    animation: fadeIn 0.3s ease-out forwards;
}
    </style>
</head>
<body>

    <div class="split-container">
        <!-- SISI KIRI -->
        <div class="left-panel p-10 lg:p-12 space-y-6 overflow-y-auto custom-scroll">
            <div class="text-center">
                <div class="bismillah tracking-widest text-teal-400 mb-2">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
                <div class="inline-block">
                    <h1 class="text-4xl lg:text-5xl font-black glow-text leading-tight uppercase tracking-tighter">
                        Monitoring<br>Absensi Sholat
                    </h1>
                    <div class="logo-placeholder" style="width: 80px; height: 80px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
    <img src="logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
</div>
                    <div class="mt-4 flex justify-center text-center">
                        <div>
                            <p id="current-date" class="text-slate-300 text-[10px] font-bold tracking-[0.3em] uppercase border-y border-teal-500/50 py-2 px-6 bg-black/20 backdrop-blur-sm"></p>
                            <p class="text-[8px] text-teal-500/60 mt-2 font-bold tracking-widest uppercase">Kec. Tarogong Kidul, Garut</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- JADWAL SHOLAT -->
            <div class="grid grid-cols-5 gap-3">
                <div id="sesi-fajr" class="prayer-box glass-card p-4 rounded-2xl text-center border transition-all">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Subuh</p>
                    <p id="time-fajr" class="text-xs font-black text-white mt-1">--:--</p>
                </div>
                <div id="sesi-dhuhr" class="prayer-box glass-card p-4 rounded-2xl text-center border transition-all">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Dzuhur</p>
                    <p id="time-dhuhr" class="text-xs font-black text-white mt-1">--:--</p>
                </div>
                <div id="sesi-asr" class="prayer-box glass-card p-4 rounded-2xl text-center border transition-all">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Ashar</p>
                    <p id="time-asr" class="text-xs font-black text-white mt-1">--:--</p>
                </div>
                <div id="sesi-maghrib" class="prayer-box glass-card p-4 rounded-2xl text-center border transition-all">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Maghrib</p>
                    <p id="time-maghrib" class="text-xs font-black text-white mt-1">--:--</p>
                </div>
                <div id="sesi-isha" class="prayer-box glass-card p-4 rounded-2xl text-center border transition-all">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Isya</p>
                    <p id="time-isha" class="text-xs font-black text-white mt-1">--:--</p>
                </div>
            </div>

            <!-- STATISTIK -->
            <div class="grid grid-cols-3 gap-4">
                <div class="glass-card p-5 rounded-[1.5rem] border-l-4 border-teal-500">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Hadir</p>
                    <p id="stat-hadir" class="text-3xl font-black text-teal-400">0</p>
                </div>
                <div class="glass-card p-5 rounded-[1.5rem] border-l-4 border-yellow-500">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Telat</p>
                    <p id="stat-telat" class="text-3xl font-black text-yellow-400">0</p>
                </div>
                <div class="glass-card p-5 rounded-[1.5rem] border-l-4 border-red-500/40">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Belum</p>
                    <p id="stat-mangkir" class="text-3xl font-black text-red-500/60">0</p>
                </div>
            </div>

          <div class="flex flex-col space-y-3">
    <div class="flex justify-between items-center border-b border-white/10 pb-2">
        <h2 class="text-[10px] font-black text-white uppercase tracking-[0.3em] flex items-center gap-2">
            <i data-lucide="users" class="w-3 h-3 text-teal-500"></i>
            Daftar Siswa <span id="current-sesi-name"></span>
        </h2>
        
        <!-- GROUP TOMBOL ACTION -->
        <div class="flex gap-4">
            <button onclick="clearHistory()" class="text-[9px] font-bold uppercase text-red-400/70 hover:text-red-400 transition-colors">
                Clear List
            </button>
            <button onclick="exportData()" class="text-[9px] font-bold uppercase text-teal-400 hover:text-white transition-colors">
                Unduh Excel
            </button>
        </div>
    </div>
    <div id="stats-list" class="max-h-[250px] overflow-y-auto pr-3 custom-scroll space-y-2"></div>
</div>

                <!-- PANEL HISTORY TERAKHIR -->
                <div class="flex flex-col space-y-3">
                    <div class="flex items-center gap-2 border-b border-white/10 pb-2">
                        <h2 class="text-[10px] font-black text-teal-400 uppercase tracking-[0.3em] flex items-center gap-2">
                            <span class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></span>
                            Baru Saja Absen
                        </h2>
                    </div>
                    <div id="history-list" class="space-y-2">
                        <p class="text-[9px] text-slate-500 text-center py-4 uppercase tracking-widest italic">Belum ada aktivitas</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- SISI KANAN (SCANNER) -->
        <div class="right-panel">
            <div id="reader" class="h-full w-full"></div>
            <div class="scan-anim"></div>
            
            <!-- POPUP BERHASIL -->
            <div id="info-box" class="absolute bottom-10 left-10 right-10 glass-card rounded-[2rem] p-8 hidden border-teal-500 shadow-[0_0_60px_-15px_rgba(45,212,191,0.6)] z-40 animate-bounce">
                <div class="flex items-center gap-6">
                    <div class="bg-teal-500 p-4 rounded-2xl text-black">
                        <i data-lucide="shield-check" class="w-10 h-10"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-teal-400 uppercase tracking-[0.3em]">Absensi Berhasil</p>
                        <h3 id="info-name" class="font-black text-3xl text-white tracking-tight">---</h3>
                        <p id="info-detail" class="text-sm text-slate-400 mt-1"></p>
                    </div>
                </div>
            </div>

            <div class="absolute top-10 right-10 z-30">
                <div id="camera-status" class="bg-black/60 backdrop-blur-xl px-5 py-2 rounded-full border border-white/10 flex items-center gap-3 cursor-pointer">
                    <div id="status-dot" class="w-2 h-2 bg-yellow-500 rounded-full"></div>
                    <p id="status-text" class="text-[9px] font-bold text-white uppercase tracking-widest">Inisialisasi...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot,query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD1GjekEZ9ygmK9nh2p4sGyuTylByWztho",
        authDomain: "absen-sholat-7d00d.firebaseapp.com",
        projectId: "absen-sholat-7d00d",
        storageBucket: "absen-sholat-7d00d.firebasestorage.app",
        messagingSenderId: "592228197757",
        appId: "1:592228197757:web:19c5965d714a1b9e66d814"
    };

    const MASTER_SISWA = [
        { id: "1001", nama: "Ahmad Fauzi" },
        { id: "1002", nama: "Siti Aminah" },
        { id: "1003", nama: "Zulkifli Mansur" },
        { id: "1004", nama: "Rizky Ramadhan" },
        { id: "1005", nama: "Budi Santoso" },
        { id: "1006", nama: "Laila Majnun" }
    ];

    let auth, db, currentUser, jadwalHariIni, currentAbsensiData = [];
    let html5QrCode = null;

    // 1. TAMPILAN JAM (Langsung jalan, gak nunggu Firebase)
    const updateDate = () => {
        const el = document.getElementById('current-date');
        if (el) el.innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    };

    // 2. JADWAL SHOLAT
    async function fetchJadwal() {
        try {
            const res = await fetch(`https://api.aladhan.com/v1/timingsByAddress?address=Tarogong%20Kidul,%20Garut,%20Indonesia&method=20`);
            const json = await res.json();
            jadwalHariIni = json.data.timings;
            const keys = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            keys.forEach(k => {
                const el = document.getElementById(`time-${k.toLowerCase()}`);
                if (el) el.innerText = jadwalHariIni[k];
            });
            updateActiveSesi();
        } catch (e) { console.error("API Error:", e); }
    }

    function getSesiAktif() {
        if (!jadwalHariIni) return null;
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        const parse = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
        const sesi = [
            { id: 'fajr', label: 'Subuh', start: jadwalHariIni.Fajr, end: "06:30" },
            { id: 'dhuhr', label: 'Dzuhur', start: jadwalHariIni.Dhuhr, end: "14:30" },
            { id: 'asr', label: 'Ashar', start: jadwalHariIni.Asr, end: "17:45" },
            { id: 'maghrib', label: 'Maghrib', start: jadwalHariIni.Maghrib, end: "19:00" },
            { id: 'isha', label: 'Isya', start: jadwalHariIni.Isha, end: "21:00" }
        ];
        for (const s of sesi) {
            if (nowMins >= parse(s.start) && nowMins <= parse(s.end)) {
                return { ...s, isLate: nowMins > (parse(s.start) + 15) };
            }
        }
        return null;
    }

    function updateActiveSesi() {
        const active = getSesiAktif();
        ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'].forEach(s => {
            const el = document.getElementById(`sesi-${s}`);
            el?.classList.toggle('active-neon', active && s === active.id);
        });
        const nameEl = document.getElementById('current-sesi-name');
        if (nameEl) nameEl.innerText = active ? `(${active.label})` : "";
        renderDashboard();
    }

    // 3. SCANNER LOGIC
    async function startScanner() {
    console.log("Mengoptimalkan kamera...");
    const readerEl = document.getElementById('reader');
    if (!readerEl) return;

    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    
    // Konfigurasi QR Box dan Video
    const qrConfig = { 
        fps: 20, // Naikin fps biar lebih smooth
        qrbox: (viewfinderWidth, viewfinderHeight) => {
            // Box otomatis membesar: 70% dari area terkecil
            const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
            const boxSize = Math.floor(minEdge * 0.7); 
            return { width: boxSize, height: boxSize };
        },
        aspectRatio: 1.0 // Pakai kotak sempurna (1:1)
    };

    try {
        const devices = await Html5Qrcode.getCameras();
        if (devices && devices.length > 0) {
            const backCam = devices.find(d => 
                d.label.toLowerCase().includes('back') || 
                d.label.toLowerCase().includes('rear')
            );
            
            const selectedCameraId = backCam ? backCam.id : devices[0].id;

            await html5QrCode.start(
                selectedCameraId, 
                {
                    ...qrConfig,
                    // Tambahan config video untuk maksa autofocus dan resolusi
                    videoConstraints: {
                        facingMode: "environment",
                        width: { ideal: 1280 }, // Minta resolusi HD biar fokus tajam
                        height: { ideal: 720 },
                        focusMode: "continuous" // Pakai mode fokus terus menerus
                    }
                }, 
                onScanSuccess
            );
            
            document.getElementById('status-dot').className = "w-2 h-2 bg-teal-500 rounded-full animate-ping";
            document.getElementById('status-text').innerText = "Active";
        }
    } catch (err) {
        console.error("Scanner Error:", err);
        document.getElementById('status-text').innerText = "Failed";
    }
}

    async function onScanSuccess(decodedText) {
        const student = MASTER_SISWA.find(s => s.id === decodedText.trim());
        const sesi = getSesiAktif();
        if (!student || !sesi) return alert(!student ? "ID Salah" : "Belum Waktu Sholat");

        const today = new Date().toISOString().split('T')[0];
        try {
            await setDoc(doc(db, 'absensi_sholat', `${today}_${student.id}`), {
                student_id: student.id,
                nama: student.nama,
                tanggal: today,
                [`jam_${sesi.id}`]: new Date().toLocaleTimeString('id-ID'),
                [`status_${sesi.id}`]: sesi.isLate ? "TERLAMBAT" : "HADIR",
                last_update: Date.now()
            }, { merge: true });
            alert(`Berhasil: ${student.nama}`);
        } catch (e) { console.error(e); }
    }

window.clearHistory = async () => {
    // 1. Validasi Masalah: Konfirmasi user (Gaya lo banget)
    if (!confirm("Hapus semua data absensi hari ini? Tindakan ini gak bisa di-undo, Broo!")) return;

    const today = new Date().toISOString().split('T')[0];
    
    // 2. Analisis Akar Masalah: Query data spesifik hari ini
    const q = query(collection(db, 'absensi_sholat'), where("tanggal", "==", today));
    
    try {
        const querySnapshot = await getDocs(q);
        
        // 3. Verifikasi Data: Cek kalau emang ada yang perlu dihapus
        if (querySnapshot.empty) {
            alert("Emang udah kosong, Broo. Gak ada yang perlu dihapus.");
            return;
        }

        // 4. Solusi Utama: Eksekusi hapus massal (Batch delete via Promise.all)
        const deletePromises = querySnapshot.docs.map(doc => deleteDoc(doc.ref));
        await Promise.all(deletePromises);
        
        // 5. Feedback: Info sukses ke user
        alert("History hari ini bersih, Broo! List otomatis update.");
        
        // Opsional: Kalau lo mau list di UI langsung hilang tanpa reload
        const listContainer = document.getElementById('stats-list');
        if (listContainer) listContainer.innerHTML = ''; 

    } catch (e) {
        // Debug lanjutan jika gagal
        console.error("Gagal hapus:", e);
        alert("Gagal hapus data, cek koneksi atau permission Firebase lo!");
    }
};

    // 4. DASHBOARD RENDER
   function renderDashboard() {
    const active = getSesiAktif();
    const today = new Date().toISOString().split('T')[0];
    
    // --- LOGIC UTAMA DAFTAR SISWA (Eksisting) ---
    // ... (kode lo yang nampilin daftar semua siswa tetap di sini) ...

    // --- LOGIC PANEL HISTORY TERAKHIR (SISIPKAN DI SINI) ---
    const historyList = document.getElementById('history-list');
    if (historyList) {
        // 1. Filter hanya data hari ini yang punya timestamp (last_update)
        // 2. Sort dari yang paling baru (descending)
        // 3. Ambil 3 orang terakhir saja
        const recentLogs = [...currentAbsensiData]
            .filter(d => d.tanggal === today && d.last_update)
            .sort((a, b) => b.last_update - a.last_update)
            .slice(0, 3);

        if (recentLogs.length > 0) {
            historyList.innerHTML = recentLogs.map(log => {
                // Ambil jam sesuai sesi aktif saat ini
                const jamAbsen = log[`jam_${active?.id}`] || "Baru saja";
                
                return `
                    <div class="flex items-center justify-between p-2 bg-white/5 rounded-lg border-l-2 border-teal-500 animate-fade-in">
                        <div class="flex flex-col">
                            <p class="text-[10px] font-bold text-white uppercase tracking-tight">${log.nama}</p>
                            <p class="text-[8px] text-slate-400 uppercase tracking-tighter">
                                ${active?.label || 'Absen'} • ${jamAbsen}
                            </p>
                        </div>
                        <div class="flex items-center gap-1 bg-teal-500/10 px-2 py-1 rounded border border-teal-500/20">
                            <span class="w-1 h-1 bg-teal-400 rounded-full"></span>
                            <p class="text-[7px] font-black text-teal-400">BERHASIL</p>
                        </div>
                    </div>`;
            }).join('');
        } else {
            // Balikin ke state kosong kalau belum ada yang scan
            historyList.innerHTML = `<p class="text-[9px] text-slate-500 text-center py-4 uppercase tracking-widest italic">Belum ada aktivitas</p>`;
        }
    }
}
    // 5. BOOTSTRAP (ALUR STARTUP)
    window.onload = async () => {
        updateDate(); // Jalankan jam dulu biar user nggak panik
        
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                console.log("Login OK");
                fetchJadwal();
                onSnapshot(collection(db, 'absensi_sholat'), (snap) => {
                    currentAbsensiData = snap.docs.map(d => d.data());
                    renderDashboard();
                });
                setTimeout(startScanner, 1000);
            } else {
                signInAnonymously(auth);
            }
        });

        lucide.createIcons();
        setInterval(updateActiveSesi, 60000);
    };
</script>
</body>
</html>
